<!DOCTYPE html>
<html>
<head>
    <title>Smart Study Monitor</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            width: 550px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #ccc;
        }

        .status { font-size: 24px; font-weight: bold; }
        .green { color: green; }
        .red { color: red; }
        .orange { color: orange; }

        .todo-card {
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            background: #fafafa;
            text-align: left;
        }

        .todo-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .todo-status {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .PENDING { background: #f1c40f; }
        .IN_PROGRESS { background: #3498db; color:white; }
        .COMPLETED { background: #2ecc71; color:white; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 10px;
            margin: 8px 0;
        }

        .progress-bar {
            height: 100%;
            background: green;
            border-radius: 10px;
        }

        .noise-container {
            width: 100%;
            height: 18px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .noise-bar {
            height: 100%;
            width: 0%;
            background: green;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📹 Live Camera Monitoring</h2>
    <img src="/video">

    <!-- TIMER -->
    <div>
        Study <input id="studyMin" type="number" value="25" style="width:60px">
        Break <input id="breakMin" type="number" value="5" style="width:60px">
        <button onclick="startTimer()">Start</button>
    </div>
    <div id="timer"></div>

    <hr>

    <!-- TODO -->
    <h3>📝 Study Todo List</h3>
    <input id="subject" placeholder="Subject">
    <input id="topic" placeholder="Topic">
    <input id="todoStudy" type="number" placeholder="Study" style="width:70px">
    <input id="todoBreak" type="number" placeholder="Break" style="width:70px">
    <button onclick="addTodo()">Add</button>

    <div id="todoList"></div>

    <!-- FOCUS -->
    <h4>🎯 Focus Score</h4>
    <div class="progress-container">
        <div id="focusBar" class="progress-bar"></div>
    </div>
    <div id="focusValue"></div>

    <!-- NOISE -->
    <h4>Environment Noise</h4>
    <div class="noise-container">
        <div id="noiseBar" class="noise-bar"></div>
    </div>
    <div id="noiseText"></div>

    <!-- STATUS -->
    <div id="status" class="status">Loading...</div>
</div>

<script>
/* ================= TIMER ================= */
function startTimer() {
    const s = studyMin.value;
    const b = breakMin.value;
    fetch(`/timer/start?study=${s}&brk=${b}`, { method: "POST" });
}

/* ================= STATUS ================= */
async function refresh() {
    const statusData = await (await fetch("/status")).json();
    const timerData = await (await fetch("/timer")).json();

    const status = document.getElementById("status");
    if (!statusData.faceDetected) {
        status.innerText = "❌ NO FACE"; status.className="status orange";
    } else if (statusData.drowsy) {
        status.innerText = "😴 DROWSY"; status.className="status red";
    } else {
        status.innerText = "📘 STUDYING"; status.className="status green";
    }

    if (timerData.mode !== "IDLE") {
        const m = Math.floor(timerData.remaining / 60);
        const s = timerData.remaining % 60;
        timer.innerText = `${timerData.mode} - ${m}:${s.toString().padStart(2,"0")}`;
    } else timer.innerText = "";

    // Focus (simple)
    const score = statusData.faceDetected && !statusData.drowsy ? 90 : 50;
    focusBar.style.width = score + "%";
    focusValue.innerText = score + "/100";
}

/* ================= TODO BACKEND ================= */
async function addTodo() {
    const subject = document.getElementById("subject").value;
    const topic = document.getElementById("topic").value;
    const study = document.getElementById("todoStudy").value;
    const brk = document.getElementById("todoBreak").value;

    if (!subject || !topic || !study || !brk) {
        alert("Fill all todo fields");
        return;
    }

    await fetch("/todo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            subject: subject,
            topic: topic,
            plannedStudyMinutes: study,
            plannedBreakMinutes: brk,
            type: "DAILY"
        })
    });

    loadTodos();
}


async function startTodo(id) {
    await fetch(`/todo/${id}/start`, { method:"POST" });
    loadTodos();
}

async function completeTodo(id) {
    await fetch(`/todo/${id}/complete`, { method:"POST" });
    loadTodos();
}

async function deleteTodo(id) {
    if (!confirm("Delete todo?")) return;
    await fetch(`/todo/${id}`, { method:"DELETE" });
    loadTodos();
}

async function loadTodos() {
    const todos = await (await fetch("/todo")).json();
    const list = document.getElementById("todoList");
    list.innerHTML = "";

    todos.forEach(t => {
        const progress =
          Math.min(100, (t.actualStudySeconds / (t.plannedStudyMinutes*60)) * 100);

        list.innerHTML += `
        <div class="todo-card">
            <div class="todo-header">
                <span>${t.subject} - ${t.topic}</span>
                <span class="todo-status ${t.status}">${t.status}</span>
            </div>

            <div class="progress-container">
                <div class="progress-bar" style="width:${progress}%"></div>
            </div>

            <small>
            Study: ${Math.floor(t.actualStudySeconds/60)} /
                    ${t.plannedStudyMinutes} min |
            Break: ${Math.floor(t.actualBreakSeconds/60)} /
                   ${t.plannedBreakMinutes} min
            </small><br>

            ${t.status !== "COMPLETED" ? `
                <button onclick="startTodo(${t.id})">▶ Start</button>
                <button onclick="completeTodo(${t.id})">✅ Complete</button>
            ` : "✅ Done"}
            <button onclick="deleteTodo(${t.id})">❌ Delete</button>
        </div>`;
    });
}

/* ================= NOISE ================= */
let analyser;
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx=new AudioContext();
    analyser=ctx.createAnalyser();
    ctx.createMediaStreamSource(stream).connect(analyser);
    const data=new Uint8Array(analyser.frequencyBinCount);
    setInterval(()=>{
        analyser.getByteFrequencyData(data);
        const lvl=Math.min(100,data.reduce((a,b)=>a+b,0)/data.length);
        noiseBar.style.width=lvl+"%";
        noiseText.innerText = lvl>65?"🚨 Noise high":"";
    },400);
});

/* ================= START ================= */
setInterval(refresh,1000);
refresh();
loadTodos();
</script>

</body>
</html>
