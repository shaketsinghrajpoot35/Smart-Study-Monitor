<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dashboard - StudyFocus</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.05)',
                        glassborder: 'rgba(255, 255, 255, 0.1)',
                        neonBlue: '#4facfe',
                        neonPurple: '#00f2fe'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,0.5) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            color: white;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.7);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .input-glass:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        .btn-neon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            transition: all 0.3s;
        }
        
        .btn-neon:hover {
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.6);
            transform: scale(1.02);
        }

        .todo-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        
        .todo-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        .progress-bar-animated {
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="min-h-screen pb-10">

    <!-- NAVBAR -->
    <nav class="glass-panel mx-auto max-w-7xl mt-6 p-4 px-6 flex justify-between items-center z-50 relative">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="fas fa-brain text-white"></i>
            </div>
            <a href="/home" class="group block">
                <h1 class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 group-hover:from-blue-300 group-hover:to-purple-300 transition-all duration-300">StudyFocus</h1>
                <p class="text-xs text-gray-400 group-hover:text-gray-300">Live Dashboard</p>
            </a>
        </div>
        
        <div class="flex items-center space-x-4">
            <a href="/history" class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white bg-white/5 hover:bg-white/10 rounded-xl transition border border-white/5">
                <i class="fas fa-chart-pie mr-2"></i>Analytics
            </a>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="px-4 py-2 text-sm font-medium bg-red-500/20 hover:bg-red-500/40 text-red-300 border border-red-500/30 rounded-xl transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>Sign Out
                </button>
            </form>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto mt-8 px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- LEFT COLUMN (Camera & Timer) -->
        <div class="lg:col-span-5 flex flex-col gap-8">
            
            <!-- Camera Feed -->
            <div class="glass-panel p-5 relative overflow-hidden group">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold flex items-center"><i class="fas fa-video text-blue-400 mr-2"></i>Live Monitoring</h2>
                    <span class="flex h-3 w-3 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                </div>
                
                <div class="relative rounded-xl overflow-hidden bg-black/50 aspect-video border border-white/10 shadow-inner">
                    <img src="/video" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition duration-500" alt="Camera Feed">
                    
                    <!-- Overlay Status Indicator -->
                    <div id="statusOverlay" class="absolute bottom-4 right-4 px-3 py-1 rounded-full bg-black/60 backdrop-blur border border-white/20 text-xs font-bold flex items-center shadow-lg">
                        <span id="statusIcon" class="mr-2">⌛</span> <span id="statusText">Analyzing...</span>
                    </div>
                </div>

                <!-- Live Metrics under camera -->
                <div class="grid grid-cols-2 gap-4 mt-5">
                    <div class="bg-black/20 rounded-xl p-3 border border-white/5">
                        <div class="flex justify-between items-center mb-1">
                            <p class="text-xs text-gray-400">Focus Score</p>
                            <span id="focusLabelText" class="text-[10px] font-bold text-blue-300"></span>
                        </div>
                        <div class="flex justify-between items-end mb-1">
                            <span id="focusValueText" class="text-xl font-bold text-blue-400">0%</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-700 rounded-full overflow-hidden">
                            <div id="focusBarGraph" class="h-full bg-gradient-to-r from-blue-500 to-purple-500 progress-bar-animated" style="width: 0%"></div>
                        </div>
                    </div>
                    
                    <div class="bg-black/20 rounded-xl p-3 border border-white/5">
                        <p class="text-xs text-gray-400 mb-1">Env. Noise</p>
                        <div class="flex justify-between items-end mb-1">
                            <span id="noiseValueText" class="text-sm font-bold text-gray-300">Quiet</span>
                        </div>
                        <div class="w-full h-1.5 bg-gray-700 rounded-full overflow-hidden relative">
                            <div id="noiseBarGraph" class="h-full bg-gradient-to-r from-green-400 to-yellow-500 progress-bar-animated" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Timer Widget -->
            <div class="glass-panel p-6">
                <h2 class="text-lg font-semibold mb-5 flex items-center"><i class="fas fa-stopwatch text-purple-400 mr-2"></i>Study Session</h2>
                
                <div class="flex flex-col items-center justify-center py-6 bg-black/20 rounded-2xl border border-white/5 mb-6 relative hover:bg-black/30 transition">
                    <div class="absolute top-4 left-4">
                        <span id="timerModeBadge" class="text-xs font-bold px-2 py-1 rounded-md bg-gray-600/50 text-gray-300">IDLE</span>
                    </div>
                    <div id="timerDisplay" class="text-6xl font-light tracking-widest text-transparent bg-clip-text bg-gradient-to-br from-white to-gray-400 mt-2">
                        00:00
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-xs text-gray-400 ml-1">Study (Min)</label>
                        <input id="studyMin" type="number" value="25" class="w-full input-glass rounded-xl px-4 py-2 mt-1 text-center font-bold">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 ml-1">Break (Min)</label>
                        <input id="breakMin" type="number" value="5" class="w-full input-glass rounded-xl px-4 py-2 mt-1 text-center font-bold">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startTimer()" id="startTimerBtn" class="w-full btn-neon text-white font-bold py-3 rounded-xl shadow-lg flex justify-center items-center">
                        <i class="fas fa-play mr-2"></i> Start Timer
                    </button>
                    <button onclick="stopTimer()" id="stopTimerBtn" class="w-full bg-red-500/20 hover:bg-red-500/40 text-red-300 border border-red-500/30 font-bold py-3 rounded-xl transition flex justify-center items-center">
                        <i class="fas fa-stop mr-2"></i> Stop
                    </button>
                </div>
            </div>

        </div>

        <!-- RIGHT COLUMN (Todos & Charts) -->
        <div class="lg:col-span-7 flex flex-col gap-8">
            
            <!-- Quick Chart: Week Focus Trend (WIRED TO REAL DATA) -->
            <div class="glass-panel p-5 hidden lg:block">
               <div class="flex justify-between items-center mb-3">
                   <h2 class="text-lg font-semibold flex items-center"><i class="fas fa-chart-area text-blue-400 mr-2"></i>Weekly Study Activity</h2>
                   <div class="flex items-center space-x-2 text-xs">
                       <span class="flex items-center text-blue-300"><span class="w-2 h-2 rounded-full bg-blue-400 mr-1 inline-block"></span>Focus</span>
                       <span class="flex items-center text-emerald-300 ml-3"><span class="w-2 h-2 rounded-full bg-emerald-400 mr-1 inline-block"></span>Study min</span>
                   </div>
               </div>
               <div class="relative h-40">
                   <canvas id="weeklyChart"></canvas>
               </div>
            </div>

            <!-- Todo List -->
            <div class="glass-panel p-6 flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center"><i class="fas fa-list-check text-green-400 mr-2"></i>Action Items</h2>
                    <span class="text-xs text-gray-400 bg-black/30 px-3 py-1 rounded-full"><span id="todoCount">0</span> tasks today</span>
                </div>

                <!-- Add Todo Form -->
                <div class="glass-panel p-5 mb-6 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-purple-500/5 opacity-0 group-hover:opacity-100 transition duration-500"></div>
                    <div class="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold ml-1">Subject</label>
                            <div class="relative">
                                <i class="fas fa-book absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs text-opacity-70 group-hover:text-opacity-100 transition-all"></i>
                                <input id="addSubject" type="text" placeholder="e.g. Machine Learning" class="w-full input-glass rounded-xl pl-8 pr-3 py-2.5 text-sm transition-all focus:bg-black/30">
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold ml-1">Topic</label>
                            <div class="relative">
                                <i class="fas fa-layer-group absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs text-opacity-70 group-hover:text-opacity-100 transition-all"></i>
                                <input id="addTopic" type="text" placeholder="Neural Networks" class="w-full input-glass rounded-xl pl-8 pr-3 py-2.5 text-sm transition-all focus:bg-black/30">
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold ml-1">Study Time (min)</label>
                            <div class="relative">
                                <i class="fas fa-stopwatch absolute left-3 top-1/2 -translate-y-1/2 text-blue-400 text-xs"></i>
                                <input id="addStudy" type="number" value="25" class="w-full input-glass rounded-xl pl-8 pr-3 py-2.5 text-sm font-semibold text-blue-300 transition-all focus:bg-black/30">
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold ml-1">Break Time (min)</label>
                            <div class="relative">
                                <i class="fas fa-mug-hot absolute left-3 top-1/2 -translate-y-1/2 text-emerald-400 text-xs"></i>
                                <input id="addBreak" type="number" value="5" class="w-full input-glass rounded-xl pl-8 pr-3 py-2.5 text-sm font-semibold text-emerald-300 transition-all focus:bg-black/30">
                            </div>
                        </div>
                        <div class="md:col-span-2 mt-2">
                            <button onclick="addTodo()" class="w-full btn-neon text-white font-bold py-2.5 rounded-xl shadow-[0_0_15px_rgba(79,172,254,0.3)] flex justify-center items-center group-hover:shadow-[0_0_20px_rgba(79,172,254,0.5)] transition-all relative overflow-hidden">
                                <span class="relative flex items-center"><i class="fas fa-plus-circle mr-2 group-hover:rotate-90 transition duration-300 relative"></i> Add New Task</span>
                            </button>
                            <p id="todoError" class="text-xs text-red-400 mt-2 text-center opacity-0 transition-opacity">Please fill all task fields.</p>
                        </div>
                    </div>
                </div>

                <!-- Todos Container -->
                <div id="todoListContainer" class="flex-1 overflow-y-auto pr-2 space-y-3 max-h-[400px]">
                    <!-- Injected via JS -->
                </div>

            </div>

        </div>
    </div>


<script>
/* ================= Timer & Metrics Backend Variables ================= */
let globalMode = 'IDLE';
let weeklyChart = null;

/* ================= TIMER ================= */
function startTimer() {
    const s = document.getElementById("studyMin").value;
    const b = document.getElementById("breakMin").value;
    fetch(`/timer/start?study=${s}&brk=${b}`, { method: "POST" });
}

async function stopTimer() {
    await fetch('/timer/stop', { method: 'POST' });
}

/* ================= WEEKLY CHART ================= */
async function loadWeeklyChart() {
    try {
        const res = await fetch('/api/analytics/weekly');
        const data = await res.json();
        if (!data || data.length === 0) return;

        const labels = data.map(d => {
            const dt = new Date(d.date);
            return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'numeric', day: 'numeric' });
        });
        const focusScores = data.map(d => d.averageFocusScore);
        const studyMins = data.map(d => Math.floor(d.totalStudySeconds / 60));

        const canvas = document.getElementById('weeklyChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        if (weeklyChart) weeklyChart.destroy();
        weeklyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Avg Focus Score',
                        data: focusScores,
                        borderColor: 'rgba(79, 172, 254, 0.9)',
                        backgroundColor: 'rgba(79, 172, 254, 0.15)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(79, 172, 254, 1)',
                        pointRadius: 4,
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Study Minutes',
                        data: studyMins,
                        borderColor: 'rgba(52, 211, 153, 0.9)',
                        backgroundColor: 'rgba(52, 211, 153, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(52, 211, 153, 1)',
                        pointRadius: 4,
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(15,23,42,0.9)',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1,
                        titleColor: '#94a3b8',
                        bodyColor: '#e2e8f0'
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#64748b', font: { size: 10 } }
                    },
                    y: {
                        type: 'linear', position: 'left',
                        min: 0, max: 100,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#4facfe', font: { size: 10 } }
                    },
                    y1: {
                        type: 'linear', position: 'right',
                        min: 0,
                        grid: { drawOnChartArea: false },
                        ticks: { color: '#34d399', font: { size: 10 } }
                    }
                }
            }
        });
    } catch(e) { console.warn('Chart load failed', e); }
}

/* ================= NOISE SIMULATOR / MIC ================= */
let analyser;
let currentNoiseLvl = 0;
try {
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
        const ctx=new AudioContext();
        analyser=ctx.createAnalyser();
        ctx.createMediaStreamSource(stream).connect(analyser);
        const data=new Uint8Array(analyser.frequencyBinCount);
        setInterval(()=>{
            analyser.getByteFrequencyData(data);
            currentNoiseLvl = Math.min(100, Math.floor(data.reduce((a,b)=>a+b,0)/data.length));
        },400);
    }).catch(e => console.log("Mic access denied or unavailable", e));
} catch(e) {}

/* ================= CORE REFRESH LOOP ================= */
async function refresh() {
    try {
        const statusRes = await fetch("/status");
        const statusData = await statusRes.json();
        const timerRes = await fetch("/timer");
        const timerData = await timerRes.json();

        // Status Overlay logic
        const overlay = document.getElementById("statusOverlay");
        const icon = document.getElementById("statusIcon");
        const text = document.getElementById("statusText");

        if (!statusData.faceDetected) {
            overlay.className = "absolute bottom-4 right-4 px-3 py-1 rounded-full bg-orange-500/80 backdrop-blur border border-orange-300/30 text-white text-xs font-bold flex items-center shadow-[0_0_15px_rgba(249,115,22,0.5)]";
            icon.innerText = "⚠️"; text.innerText = "NO FACE DETECTED";
        } else if (statusData.drowsy) {
            overlay.className = "absolute bottom-4 right-4 px-3 py-1 rounded-full bg-red-600/80 backdrop-blur border border-red-400/30 text-white text-xs font-bold flex items-center shadow-[0_0_15px_rgba(220,38,38,0.5)]";
            icon.innerText = "😴"; text.innerText = "DROWSY / SLEEPING";
        } else {
            overlay.className = "absolute bottom-4 right-4 px-3 py-1 rounded-full bg-emerald-500/80 backdrop-blur border border-emerald-300/30 text-white text-xs font-bold flex items-center shadow-[0_0_15px_rgba(16,185,129,0.5)]";
            icon.innerText = "🎯"; text.innerText = "FOCUSED";
        }

        // Focus Logic (Score from REAL API — statusData.focusScore)
        const score = statusData.focusScore || 0;
        document.getElementById("focusValueText").innerText = score + "%";
        document.getElementById("focusBarGraph").style.width = score + "%";
        if (document.getElementById("focusLabelText")) {
            document.getElementById("focusLabelText").innerText = statusData.focusLabel || "";
        }

        // Color transition for focus bar
        const fb = document.getElementById("focusBarGraph");
        if(score > 80) fb.className = "h-full bg-gradient-to-r from-blue-500 to-purple-500 progress-bar-animated";
        else if(score > 40) fb.className = "h-full bg-gradient-to-r from-yellow-400 to-orange-500 progress-bar-animated";
        else fb.className = "h-full bg-gradient-to-r from-red-500 to-red-600 progress-bar-animated";

        // Noise Rendering
        document.getElementById("noiseBarGraph").style.width = currentNoiseLvl + "%";
        const nv = document.getElementById("noiseValueText");
        if(currentNoiseLvl > 65) {
            nv.innerText = "Loud 🚨";
            nv.className = "text-sm font-bold text-red-400 animate-pulse";
            document.getElementById("noiseBarGraph").className = "h-full bg-gradient-to-r from-orange-500 to-red-500 progress-bar-animated";
        } else {
            nv.innerText = "Quiet";
            nv.className = "text-sm font-bold text-gray-300";
            document.getElementById("noiseBarGraph").className = "h-full bg-gradient-to-r from-green-400 to-emerald-500 progress-bar-animated";
        }

        // Timer Logic
         globalMode = timerData.mode;
        const modeBadge = document.getElementById("timerModeBadge");
        
        if (timerData.mode !== "IDLE") {
            const m = Math.floor(timerData.remaining / 60);
            const s = timerData.remaining % 60;
            document.getElementById("timerDisplay").innerText = `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
            modeBadge.innerText = timerData.mode;
            
            if(timerData.mode === "STUDY") {
                modeBadge.className = "text-xs font-bold px-2 py-1 rounded-md bg-blue-500/20 text-blue-300 border border-blue-500/30 shadow-[0_0_10px_rgba(59,130,246,0.3)] animate-pulse";
            } else {
                modeBadge.className = "text-xs font-bold px-2 py-1 rounded-md bg-green-500/20 text-green-300 border border-green-500/30 shadow-[0_0_10px_rgba(16,185,129,0.3)]";
            }
        } else {
            document.getElementById("timerDisplay").innerText = "00:00";
            modeBadge.innerText = "IDLE";
            modeBadge.className = "text-xs font-bold px-2 py-1 rounded-md bg-gray-600/50 text-gray-300";
        }
    } catch(e) {}
}

/* ================= TODO LOGIC ================= */
async function addTodo() {
    const subject = document.getElementById("addSubject").value;
    const topic = document.getElementById("addTopic").value;
    const study = document.getElementById("addStudy").value;
    const brk = document.getElementById("addBreak").value;
    const errorMsg = document.getElementById("todoError");

    if (!subject || !topic || !study || !brk) {
        errorMsg.classList.remove("opacity-0");
        setTimeout(() => errorMsg.classList.add("opacity-0"), 3000);
        return;
    }

    const btn = document.querySelector('button[onclick="addTodo()"]');
    const origHtml = btn.innerHTML;
    btn.innerHTML = `<span class="relative flex items-center"><i class="fas fa-spinner fa-spin mr-2"></i> Adding Task...</span>`;
    btn.disabled = true;

    await fetch("/todo", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            subject: subject,
            topic: topic,
            plannedStudyMinutes: study,
            plannedBreakMinutes: brk,
            type: "DAILY"
        })
    });
    
    // reset
    document.getElementById("addSubject").value = "";
    document.getElementById("addTopic").value = "";
    document.getElementById("addStudy").value = "25";
    document.getElementById("addBreak").value = "5";

    btn.innerHTML = origHtml;
    btn.disabled = false;

    loadTodos();
}

async function startTodo(id) { await fetch(`/todo/${id}/start`, { method:"POST" }); loadTodos(); }
async function completeTodo(id) { await fetch(`/todo/${id}/complete`, { method:"POST" }); loadTodos(); }
async function deleteTodo(id) { 
    if(confirm("Remove this task?")) {
        await fetch(`/todo/${id}`, { method:"DELETE" }); loadTodos(); 
    }
}

async function loadTodos() {
    try {
        const res = await fetch("/todo");
        const todos = await res.json();
        
        document.getElementById("todoCount").innerText = todos.length;
        
        const list = document.getElementById("todoListContainer");

        if(todos.length === 0) {
            list.innerHTML = `
            <div class="flex flex-col items-center justify-center py-10 px-4 text-center glass-panel opacity-60">
                <div class="w-16 h-16 rounded-full bg-blue-500/10 flex items-center justify-center mb-3 border border-blue-500/20">
                    <i class="fas fa-list-check text-2xl text-blue-400"></i>
                </div>
                <h3 class="text-gray-300 font-semibold mb-1">You're all caught up!</h3>
                <p class="text-xs text-gray-500">Add a new task above to begin your study session.</p>
            </div>`;
            return;
        }

        let htmlString = "";
        todos.forEach(t => {
            const progress = Math.min(100, (t.actualStudySeconds / (t.plannedStudyMinutes*60)) * 100);
            
            let statusBadge = "";
            let actionBtns = "";
            let borderColor = t.status === "COMPLETED" ? "border-emerald-500/20 bg-emerald-500/5 hover:bg-emerald-500/10" : 
                              (t.status === "IN_PROGRESS" ? "border-blue-500/30 bg-blue-500/10 shadow-[0_4px_20px_rgba(59,130,246,0.1)]" : "border-white/5");
            
            if(t.status === "COMPLETED") {
                statusBadge = `<span class="bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 px-2 py-0.5 rounded text-[10px] font-bold tracking-wider">DONE</span>`;
                actionBtns = `<button onclick="deleteTodo(${t.id})" class="text-xs text-red-400/70 hover:text-red-400 bg-red-400/10 hover:bg-red-400/20 rounded p-1.5 transition ml-2" title="Delete"><i class="fas fa-trash"></i></button>`;
            } else if (t.status === "IN_PROGRESS") {
                 statusBadge = `<span class="bg-blue-500/20 text-blue-300 border border-blue-500/30 px-2 py-0.5 rounded text-[10px] font-bold tracking-wider animate-pulse">ACTIVE</span>`;
                 actionBtns = `
                    <button onclick="completeTodo(${t.id})" class="w-7 h-7 rounded bg-gradient-to-r from-emerald-500 to-teal-400 text-white hover:shadow-[0_0_10px_rgba(16,185,129,0.5)] transition flex items-center justify-center group/btn" title="Complete"><i class="fas fa-check group-hover/btn:scale-110 transition"></i></button>
                    <button onclick="deleteTodo(${t.id})" class="text-xs text-red-400/70 hover:text-red-400 bg-red-400/10 hover:bg-red-400/20 rounded p-1.5 transition ml-2" title="Delete"><i class="fas fa-trash"></i></button>
                 `;
            } else {
                 statusBadge = `<span class="bg-gray-500/20 text-gray-300 border border-gray-500/30 px-2 py-0.5 rounded text-[10px] font-bold tracking-wider">PENDING</span>`;
                 actionBtns = `
                    <button onclick="startTodo(${t.id})" class="w-7 h-7 rounded bg-gradient-to-r from-blue-500 to-purple-500 text-white hover:shadow-[0_0_10px_rgba(59,130,246,0.5)] transition flex items-center justify-center mr-2 group/btn" title="Start Task"><i class="fas fa-play text-[10px] ml-0.5 group-hover/btn:scale-110 transition"></i></button>
                    <button onclick="deleteTodo(${t.id})" class="text-xs text-red-400/70 hover:text-red-400 bg-red-400/10 hover:bg-red-400/20 rounded p-1.5 transition" title="Delete"><i class="fas fa-trash"></i></button>
                 `;
            }

            htmlString += `
            <div class="todo-item p-4 rounded-xl border ${borderColor} relative overflow-hidden group pb-5 transition-all mb-3">
                ${t.status === 'IN_PROGRESS' ? '<div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-blue-500 to-purple-500 shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>' : ''}
                
                <div class="flex justify-between items-start mb-3">
                    <div class="pr-2">
                        <div class="flex items-center space-x-2 mb-1">
                            <h3 class="font-bold text-gray-100 flex items-center group-hover:text-blue-200 transition-colors">
                            ${t.status === 'COMPLETED' ? '<i class="fas fa-check-circle text-emerald-400 mr-1.5 text-xs"></i><span class="line-through opacity-70">' : ''}
                            ${t.subject}
                            ${t.status === 'COMPLETED' ? '</span>' : ''}
                            </h3>
                            ${statusBadge}
                        </div>
                        <p class="text-xs ${t.status === 'COMPLETED' ? 'text-gray-500 line-through' : 'text-gray-400'} mt-0.5 flex items-center">
                            <i class="fas fa-angle-right text-[10px] mr-1 opacity-50"></i> ${t.topic}
                        </p>
                    </div>
                    <div class="flex items-center flex-shrink-0">
                        ${actionBtns}
                    </div>
                </div>

                <div class="mt-2 pl-1">
                    <div class="flex justify-between text-[10px] ${t.status === 'COMPLETED' ? 'text-gray-500' : 'text-gray-400'} font-medium mb-1 tracking-wider uppercase">
                        <span>Progress</span>
                        <span class="bg-black/20 px-1.5 py-0.5 rounded">${Math.floor(t.actualStudySeconds/60)} / ${t.plannedStudyMinutes}m</span>
                    </div>
                    <div class="w-full h-1.5 bg-black/40 rounded-full overflow-hidden border border-white/5">
                        <div class="h-full bg-gradient-to-r ${t.status === 'COMPLETED' ? 'from-emerald-500 to-teal-400' : 'from-blue-500 to-purple-500'} progress-bar-animated relative" style="width:${progress}%">
                            ${t.status === 'IN_PROGRESS' ? '<div class="absolute inset-0 w-full h-full bg-white/20 animate-[pulse_1s_infinite]"></div>' : ''}
                        </div>
                    </div>
                </div>
            </div>`;
        });
        list.innerHTML = htmlString;
    } catch(e) {}
}

setInterval(refresh, 1000);
refresh();
loadTodos();
loadWeeklyChart();
// Refresh chart every 5 minutes
setInterval(loadWeeklyChart, 5 * 60 * 1000);

</script>

</body>
</html>
