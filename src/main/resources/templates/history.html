<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analytics History - StudyFocus</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- NAVBAR -->
<nav class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-4 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fas fa-chart-line text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">StudyFocus Analytics</h1>
        </div>
        <div class="flex items-center space-x-4">
            <a href="/dashboard" class="px-4 py-2 hover:bg-white hover:bg-opacity-20 rounded-lg transition"><i class="fas fa-tv mr-2"></i>Live Dashboard</a>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition shadow-md"><i class="fas fa-sign-out-alt mr-2"></i>Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mx-auto mt-8 px-4">
    <div class="mb-8 flex justify-between items-end">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">Your Study History</h2>
            <p class="text-gray-500 mt-1">Review your weekly performance and focus trends.</p>
        </div>
        <div>
            <button onclick="loadWeeklyData()" class="bg-blue-600 text-white px-4 py-2 rounded-l-lg hover:bg-blue-700">7 Days</button>
            <button onclick="loadMonthlyData()" class="bg-indigo-600 text-white px-4 py-2 rounded-r-lg hover:bg-indigo-700 border-l border-indigo-800">30 Days</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        
        <!-- Focus Score Chart -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h3 class="text-xl font-semibold mb-4 text-gray-700"><i class="fas fa-bullseye text-red-500 mr-2"></i>Average Focus Score</h3>
            <canvas id="focusChart" height="200"></canvas>
        </div>

        <!-- Time Track Chart -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h3 class="text-xl font-semibold mb-4 text-gray-700"><i class="fas fa-clock text-green-500 mr-2"></i>Study vs Break Time</h3>
            <canvas id="timeChart" height="200"></canvas>
        </div>

    </div>
</div>

<script>
    let focusChart, timeChart;

    const renderCharts = (labels, focusData, studyData, breakData) => {
        // Destroy old if exists
        if(focusChart) focusChart.destroy();
        if(timeChart) timeChart.destroy();

        const fCtx = document.getElementById('focusChart').getContext('2d');
        focusChart = new Chart(fCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Focus Score / 100',
                    data: focusData,
                    borderColor: 'rgb(239, 68, 68)',
                    backgroundColor: 'rgba(239, 68, 68, 0.2)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { scales: { y: { min: 0, max: 100 } } }
        });

        const tCtx = document.getElementById('timeChart').getContext('2d');
        timeChart = new Chart(tCtx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Study Minutes',
                        data: studyData,
                        backgroundColor: 'rgba(34, 197, 94, 0.8)'
                    },
                    {
                        label: 'Break Minutes',
                        data: breakData,
                        backgroundColor: 'rgba(59, 130, 246, 0.8)'
                    }
                ]
            },
            options: { stacked: true }
        });
    }

    const fetchData = async (url) => {
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            const labels = data.map(d => d.date);
            const focus = data.map(d => d.averageFocusScore);
            const study = data.map(d => Math.floor(d.totalStudySeconds / 60));
            const breakTime = data.map(d => Math.floor(d.totalBreakSeconds / 60));

            renderCharts(labels, focus, study, breakTime);
        } catch (error) {
            console.error("Error fetching analytics", error);
        }
    };

    const loadWeeklyData = () => fetchData('/api/analytics/weekly');
    const loadMonthlyData = () => fetchData('/api/analytics/monthly');

    // Initial load
    window.onload = loadWeeklyData;
</script>

</body>
</html>
