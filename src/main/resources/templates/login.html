<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyFocus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: { 'blob': 'blob 7s infinite', 'fade-in': 'fadeIn 0.5s ease-out forwards' },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            overflow: hidden;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s;
        }
        
        .input-glass:focus {
            outline: none;
            border-color: #4facfe;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        .btn-neon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-neon:hover {
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
            transform: translateY(-2px);
        }

        .color-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative p-4">

    <!-- Glowing Background Orbs -->
    <div class="color-orb bg-blue-600 w-96 h-96 top-0 left-0 animate-blob"></div>
    <div class="color-orb bg-indigo-500 w-80 h-80 bottom-0 right-0 animate-blob animation-delay-4000"></div>

    <div class="glass-panel p-8 md:p-10 w-full max-w-md relative z-10 animate-fade-in">
        
        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.4)] mb-4">
                <i class="fas fa-user-lock text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Welcome Back</h1>
            <p class="text-sm text-gray-400">Sign in to sync your study progress</p>
        </div>
        
        <!-- Alerts -->
        <div th:if="${param.error}" class="bg-red-500/20 border border-red-500/30 text-red-300 px-4 py-3 rounded-xl relative mb-6 text-sm flex items-center shadow-[0_0_10px_rgba(239,68,68,0.2)]">
            <i class="fas fa-exclamation-circle mr-3 text-red-400"></i>
            <span>Invalid credentials provided.</span>
        </div>
        
        <div th:if="${param.logout}" class="bg-emerald-500/20 border border-emerald-500/30 text-emerald-300 px-4 py-3 rounded-xl relative mb-6 text-sm flex items-center shadow-[0_0_10px_rgba(16,185,129,0.2)]">
            <i class="fas fa-check-circle mr-3 text-emerald-400"></i>
            <span>You have been securely logged out.</span>
        </div>
        
        <div th:if="${param.success}" class="bg-blue-500/20 border border-blue-500/30 text-blue-300 px-4 py-3 rounded-xl relative mb-6 text-sm flex items-center shadow-[0_0_10px_rgba(59,130,246,0.2)]">
            <i class="fas fa-user-check mr-3 text-blue-400"></i>
            <span>Account verified! Please log in below.</span>
        </div>

        <form th:action="@{/authenticate}" method="post" class="space-y-5">
            <div>
                <label class="block text-gray-400 text-sm font-medium mb-1.5 pl-1"><i class="fas fa-envelope md-text mr-1"></i> Email or Username</label>
                <input type="text" name="username" required placeholder="example@email.com" class="w-full input-glass rounded-xl px-4 py-3">
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-1.5 pl-1 pr-1">
                    <label class="block text-gray-400 text-sm font-medium"><i class="fas fa-key text-md mr-1"></i> Password</label>
                    <a href="#" class="text-xs text-blue-400 hover:text-blue-300 transition">Forgot password?</a>
                </div>
                <input type="password" name="password" required placeholder="••••••••" class="w-full input-glass rounded-xl px-4 py-3">
            </div>
            
            <button type="submit" class="w-full btn-neon text-white font-bold text-lg py-3 rounded-xl mt-4">
                Enter Dashboard <i class="fas fa-arrow-right ml-2 text-sm"></i>
            </button>
        </form>
        
        <div class="mt-8 text-center border-t border-white/10 pt-6">
            <p class="text-gray-400 text-sm">
                New to StudyFocus? 
                <a href="/register" class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 font-bold hover:opacity-80 transition ml-1">Create an Account</a>
            </p>
            <p class="text-xs text-gray-500 mt-4"><a href="/" class="hover:text-gray-300 transition">&larr; Back to Home</a></p>
        </div>
        
    </div>
</body>
</html>
