<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - StudyFocus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <i class="fas fa-user-plus text-4xl text-green-600 mb-2"></i>
            <h1 class="text-2xl font-bold">Create Account</h1>
            <p class="text-gray-500 text-sm mt-1">Start tracking your study habits</p>
        </div>
        
        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="space-y-4">
            <div>
                <label class="block text-gray-700 mb-1">Username</label>
                <input type="text" th:field="*{username}" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-gray-700 mb-1">Email</label>
                <input type="email" th:field="*{email}" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-gray-700 mb-1">Password</label>
                <input type="password" th:field="*{password}" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700 transition">
                Sign Up
            </button>
        </form>
        
        <p class="mt-4 text-center text-gray-600 text-sm">
            Already have an account? <a href="/login" class="text-green-600 font-semibold hover:underline">Log in</a>
        </p>
    </div>
</body>
</html>
