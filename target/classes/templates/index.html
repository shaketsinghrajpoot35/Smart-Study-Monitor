<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFocus - Smart Study Monitor</title>

    <!-- Tailwind + Axios + FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }
        .card { transition: transform 0.3s, box-shadow 0.3s; }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 75%;
            overflow: hidden;
            border-radius: 12px;
            background: black;
        }
        .video-container img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- ================= NAVBAR ================= -->
<nav class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fas fa-graduation-cap text-2xl"></i>
            <h1 class="text-xl font-bold">StudyFocus</h1>
        </div>
        <div class="flex items-center space-x-4">
            <a href="/" class="px-4 py-2 bg-white bg-opacity-20 rounded-lg">Home</a>
            <a href="/dashboard" class="px-4 py-2 bg-white bg-opacity-20 rounded-lg">Dashboard</a>
        </div>
    </div>
</nav>

<!-- ================= MAIN ================= -->
<main class="container mx-auto p-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- ===== LEFT SIDE ===== -->
        <div class="space-y-6">

            <!-- ===== LIVE VIDEO ===== -->
            <div class="bg-white rounded-xl shadow-sm p-5 card">
                <h2 class="text-xl font-bold mb-4">Study Monitor (Live)</h2>

                <div class="video-container mb-4">
                    <!-- 🔴 IMPORTANT: JAVA STREAM ENDPOINT -->
                    <img src="/video/feed" id="videoFeed">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-gray-100 rounded-lg p-4 text-center">
                        <p class="text-sm text-gray-600">Status</p>
                        <p id="status-text" class="font-bold text-green-600">Loading...</p>
                    </div>
                    <div class="bg-gray-100 rounded-lg p-4 text-center">
                        <p class="text-sm text-gray-600">Environment</p>
                        <p id="env-text" class="font-bold text-blue-600">Loading...</p>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="startCamera()" class="flex-1 bg-green-600 text-white py-2 rounded-lg">
                        ▶ Start Camera
                    </button>
                    <button onclick="stopCamera()" class="flex-1 bg-red-600 text-white py-2 rounded-lg">
                        ⏹ Stop Camera
                    </button>
                </div>
            </div>

            <!-- ===== STUDENT INFO ===== -->
            <div class="bg-white rounded-xl shadow-sm p-5 card text-center">
                <h2 class="text-xl font-bold mb-4">Student Info</h2>

                <input type="number" id="student-age"
                       placeholder="Enter Age"
                       class="w-1/2 border rounded-lg p-2 mb-3">

                <button onclick="setAge()"
                        class="w-1/2 bg-blue-600 text-white py-2 rounded-lg">
                    Set Age
                </button>

                <p id="screen-recommendation"
                   class="mt-4 text-gray-800 font-semibold"></p>
            </div>

            <!-- ===== TIMER ===== -->
            <div class="bg-white rounded-xl shadow-sm p-5 card">
                <h2 class="text-xl font-bold mb-4">Study Timer</h2>

                <div class="bg-gray-100 rounded-lg p-4 text-center mb-4">
                    <p id="timer-mode">Mode: -</p>
                    <p id="timer-time" class="text-3xl font-bold">--:--</p>
                </div>

                <form id="timer-form" class="space-y-3">
                    <input type="number" id="study" placeholder="Study minutes"
                           class="w-full border rounded-lg p-2">
                    <input type="number" id="break" placeholder="Break minutes"
                           class="w-full border rounded-lg p-2">
                    <button class="w-full bg-blue-600 text-white py-2 rounded-lg">
                        Update Timer
                    </button>
                </form>
            </div>

        </div>

        <!-- ===== RIGHT SIDE ===== -->
        <div class="space-y-6">

            <div class="bg-white rounded-xl shadow-sm p-5 card">
                <h2 class="text-xl font-bold mb-4">Today's Progress</h2>
                <p>Check dashboard for detailed analytics.</p>
            </div>

        </div>
    </div>
</main>

<!-- ================= JS ================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    setInterval(updateStatus, 2000);
    setInterval(updateTimer, 1000);

    document.getElementById("timer-form").addEventListener("submit", e => {
        e.preventDefault();
        setTimer();
    });
});

function startCamera() {
    axios.get("/video/start");
}

function stopCamera() {
    axios.get("/video/stop");
}

async function updateStatus() {
    try {
        const res = await axios.get("/status");
        document.getElementById("status-text").innerText = res.data.stateText || "Awake";
        document.getElementById("env-text").innerText = res.data.envText || "Quiet";
    } catch {}
}

async function updateTimer() {
    try {
        const res = await axios.get("/timer_status");
        document.getElementById("timer-mode").innerText = "Mode: " + res.data.mode;
        document.getElementById("timer-time").innerText = res.data.time;
    } catch {}
}

async function setTimer() {
    const study = document.getElementById("study").value * 60;
    const br = document.getElementById("break").value * 60;
    await axios.post("/set_timer", { study, break: br });
}

async function setAge() {
    const age = document.getElementById("student-age").value;
    const res = await axios.post("/set_age", { age });
    document.getElementById("screen-recommendation").innerText =
        res.data.recommendation;
}
</script>

</body>
</html>
