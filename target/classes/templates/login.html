<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - StudyFocus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <i class="fas fa-graduation-cap text-4xl text-blue-600 mb-2"></i>
            <h1 class="text-2xl font-bold">StudyFocus Login</h1>
        </div>
        
        <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
            Invalid username and password.
        </div>
        <div th:if="${param.logout}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4">
            You have been logged out.
        </div>
        <div th:if="${param.success}" class="bg-blue-100 border border-blue-400 text-blue-700 px-4 py-3 rounded relative mb-4">
            Registered successfully! Please log in.
        </div>

        <form th:action="@{/authenticate}" method="post" class="space-y-4">
            <div>
                <label class="block text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition">
                Log In
            </button>
        </form>
        
        <p class="mt-4 text-center text-gray-600 text-sm">
            Don't have an account? <a href="/register" class="text-blue-600 font-semibold hover:underline">Sign up</a>
        </p>
    </div>
</body>
</html>
